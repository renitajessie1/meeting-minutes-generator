<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sign In — Meeting Minutes</title>
<style>
  :root {
    --bg: #0f172a;
    --card: #1e293b;
    --border: #334155;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #3b82f6;
    --accent-hover: #2563eb;
    --mint: #2dd4bf;
    --error: #f87171;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: 'Segoe UI', system-ui, sans-serif;
    color: var(--text);
    padding: 20px;
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 36px 32px;
    width: 100%;
    max-width: 380px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: var(--accent);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  .logo-text {
    font-weight: 600;
    font-size: 16px;
  }

  h1 {
    font-size: 20px;
    margin: 0 0 6px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin: 0 0 24px;
  }

  .tabs {
    display: flex;
    margin-bottom: 24px;
    background: var(--bg);
    border-radius: 8px;
    padding: 4px;
  }

  .tab {
    flex: 1;
    text-align: center;
    padding: 8px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: all 0.15s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  label {
    display: block;
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .field {
    margin-bottom: 16px;
  }

  input {
    width: 100%;
    padding: 10px 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 14px;
  }

  input:focus {
    outline: none;
    border-color: var(--accent);
  }

  .password-wrap {
    position: relative;
  }

  .password-wrap input {
    padding-right: 40px;
  }

  .toggle-eye {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
    color: var(--muted);
    font-size: 13px;
    user-select: none;
  }

  button.submit {
    width: 100%;
    padding: 11px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }

  button.submit:hover {
    background: var(--accent-hover);
  }

  .message {
    font-size: 13px;
    margin-top: 14px;
    text-align: center;
  }

  .message.error { color: var(--error); }
  .message.success { color: var(--mint); }
</style>
</head>
<body>

  <div class="card">
    <div class="logo">
      <div class="logo-icon">✓</div>
      <div class="logo-text">Meeting Minutes</div>
    </div>

    <h1 id="formTitle">Welcome back</h1>
    <p class="subtitle" id="formSubtitle">Sign in to continue</p>

    <div class="tabs">
      <div class="tab active" id="tabLogin" onclick="switchTab('login')">Sign In</div>
      <div class="tab" id="tabSignup" onclick="switchTab('signup')">Sign Up</div>
    </div>

    <form id="authForm">
      <div class="field">
        <label for="username">Username</label>
        <input type="text" id="username" required autocomplete="username" />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrap">
          <input type="password" id="password" required autocomplete="current-password" />
          <span class="toggle-eye" id="toggleEye" onclick="togglePassword()">Show</span>
        </div>
      </div>

      <button type="submit" class="submit" id="submitBtn">Sign In</button>

      <div class="message" id="message"></div>
    </form>
  </div>

<script>
  const API_BASE_URL = "https://meeting-minutes-generator-production.up.railway.app"; // update after deployment

  let mode = "login";

  function switchTab(newMode) {
    mode = newMode;
    document.getElementById("tabLogin").classList.toggle("active", mode === "login");
    document.getElementById("tabSignup").classList.toggle("active", mode === "signup");
    document.getElementById("formTitle").textContent = mode === "login" ? "Welcome back" : "Create account";
    document.getElementById("formSubtitle").textContent = mode === "login" ? "Sign in to continue" : "Sign up to get started";
    document.getElementById("submitBtn").textContent = mode === "login" ? "Sign In" : "Sign Up";
    document.getElementById("message").textContent = "";
  }

  function togglePassword() {
    const input = document.getElementById("password");
    const eye = document.getElementById("toggleEye");
    if (input.type === "password") {
      input.type = "text";
      eye.textContent = "Hide";
    } else {
      input.type = "password";
      eye.textContent = "Show";
    }
  }

  document.getElementById("authForm").addEventListener("submit", async function (e) {
    e.preventDefault();

    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value;
    const messageEl = document.getElementById("message");
    messageEl.textContent = "";
    messageEl.className = "message";

    const endpoint = mode === "login" ? "/login" : "/signup";

    try {
      const res = await fetch(API_BASE_URL + endpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (!res.ok) {
        messageEl.textContent = data.detail || "Something went wrong";
        messageEl.classList.add("error");
        return;
      }

      if (mode === "login") {
        localStorage.setItem("access_token", data.access_token);
        window.location.href = "index.html";
      } else {
        messageEl.textContent = "Account created! You can sign in now.";
        messageEl.classList.add("success");
        switchTab("login");
      }
    } catch (err) {
      messageEl.textContent = "Could not reach server. Is the backend running?";
      messageEl.classList.add("error");
    }
  });
</script>

</body>
</html>
